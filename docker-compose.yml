services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/pose_data:/app/pose_data
    environment:
      - DEBUG=false
      - AI_PROVIDER=mock
      # Set REPLICATE_API_TOKEN to enable AI mode:
      # - REPLICATE_API_TOKEN=r8_xxx
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
