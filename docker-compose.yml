services:
  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend/static:/app/static
      - ./backend/pose_data:/app/pose_data
    environment:
      - DEBUG=false
      - AI_PROVIDER=mock
      # Set REPLICATE_API_TOKEN to enable AI mode:
      # - REPLICATE_API_TOKEN=r8_xxx
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
